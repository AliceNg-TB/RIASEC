    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans TC', '微軟正黑體', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d4eac8 0%, #b8daa3 100%);
            padding: 18px 12px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 動態漂浮葉子 */
        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
            100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
        }
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .dynamic-bg i {
            position: absolute;
            display: block;
            font-size: 28px;
            opacity: 0.3;
            animation: floatParticle 8s linear infinite;
            bottom: -40px;
        }

        /* 彩虹動畫 */
        @keyframes rainbowFlash {
            0% { background-position: 0% 50%; opacity: 0; }
            10% { opacity: 0.85; }
            90% { opacity: 0.85; }
            100% { background-position: 200% 50%; opacity: 0; }
        }
        .rainbow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(90deg, #ff9999, #ffcc99, #ffff99, #99ff99, #99ccff, #cc99ff, #ff99cc);
            background-size: 300% 100%;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .rainbow-active {
            animation: rainbowFlash 1.2s ease-out forwards;
        }

        /* 幸運草歡呼動畫 */
        @keyframes cheerClover {
            0% { transform: scale(0.2) rotate(0deg); opacity: 0; }
            20% { transform: scale(1.2) rotate(15deg); opacity: 1; }
            80% { transform: scale(1) rotate(-5deg); opacity: 1; }
            100% { transform: scale(0.8) rotate(0deg); opacity: 0; }
        }
        .cheer-lucky {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            z-index: 1000;
            pointer-events: none;
            animation: cheerClover 1s ease-out forwards;
            filter: drop-shadow(0 0 10px gold);
        }

            right: -15px;
            bottom: -25px;

            font-size: 1rem;
            text-align: center;

            color: #c55a2c;
            background: #ffe8e0;
            border-radius: 40px;
            padding: 8px;
        }

            justify-content: space-between;
            align-items: center;

        }
        .student-id-tag {
            font-weight: bold;
            color: #2c5e2e;
            font-size: 0.95rem;
        }
        .logout-btn {
            background: transparent;
            border: 1.5px solid #8aaa7b;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .section-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: #2a6230;
            border-left: 7px solid #9bc48b;
            padding-left: 16px;
            margin: 22px 0 14px;
        }
        .info-note {
            background: #f9fcf0;
            border-radius: 32px;
            padding: 12px 18px;
            font-size: 0.8rem;
            margin-bottom: 24px;

        }

            gap: 18px;
            margin-bottom: 24px;
        }
        .question-card {
            background: white;

        }
        .question-text {
            font-weight: 600;
            font-size: 0.98rem;
            margin-bottom: 14px;
            color: #2b4d2a;
        }
        .radio-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .radio-row label {
            flex: 1;
            text-align: center;

            font-size: 0.7rem;
            font-weight: 500;

        .btn-outline { background: transparent; border: 2px solid #4d824b; color: #2a6230; }

            margin-top: 24px;

        }

        }

</head>

        { text: "我喜歡銷售、談判或創業活動。", type: "E" },{ text: "我擅長制定目標並激勵大家達成。", type: "E" },
        { text: "我做事細心，喜歡按流程與規則完成文書工作。", type: "C" },{ text: "我擅長整理資料、歸檔或數據輸入。", type: "C" },
        { text: "我喜歡穩定且結構明確的工作環境。", type: "C" },{ text: "我對細節敏感，能處理精確事務。", type: "C" }
    ];

    // ---------- 儲存系統 ----------
    let currentStudentId = null;
    let currentAnswers = new Array(24).fill(null);
    let adminAuthenticated = false;

    function getStorageData() {
        let raw = localStorage.getItem("holland_riasec_final_cheer");
        if (!raw) return {};
        try { return JSON.parse(raw); } catch(e) { return {}; }
    }
    function saveStorageData(data) { localStorage.setItem("holland_riasec_final_cheer", JSON.stringify(data)); }
    function saveStudentRecord(studentId, answersArray, scores, dominant) {
        let all = getStorageData();
        all[studentId] = { answers: answersArray, scores: scores, dominant: dominant, timestamp: Date.now() };
        saveStorageData(all);
    }
    function loadStudentRecord(studentId) { return getStorageData()[studentId] || null; }
    function getAllRecords() { return getStorageData(); }
    function clearAllData() { saveStorageData({}); }

    function computeScoresFromAnswers(answers) {
        let scores = { R:0, I:0, A:0, S:0, E:0, C:0 };
        for (let i=0; i<QUESTIONS_DATA.length; i++) {
            let type = QUESTIONS_DATA[i].type;
            let val = answers[i];
            if (val && val>=1 && val<=5) scores[type] += val;
        }
        return scores;
    }
    function getDominantType(scores) {
        let maxType = TYPE_KEYS[0];
        for (let t of TYPE_KEYS) if (scores[t] > scores[maxType]) maxType = t;
        return maxType;
    }

    // 渲染問卷
    function renderQuestions(answersArray) {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        QUESTIONS_DATA.forEach((q, idx) => {
            const selectedVal = answersArray[idx];
            const div = document.createElement("div");
            div.className = "question-card";
            div.innerHTML = `
                <div class="question-text">${idx+1}. ${q.text}</div>
                <div class="radio-row">
                    ${[5,4,3,2,1].map(v => `
                        <label><input type="radio" name="q${idx}" value="${v}" ${selectedVal===v ? 'checked' : ''}> ${v}${v===5?'👍非常同意':v===4?'👌同意':v===3?'🤔普通':v===2?'😐不同意':'😤非常不同意'}</label>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
        });
        for (let i=0; i<24; i++) {
            const radios = document.getElementsByName(`q${i}`);
            radios.forEach(radio => radio.addEventListener("change", () => { if(radio.checked) currentAnswers[i]=parseInt(radio.value); }));
        }
    }

    function syncAnswersFromDOM() {
        for (let i=0; i<24; i++) {
            const radios = document.getElementsByName(`q${i}`);
            for (let r of radios) if (r.checked) { currentAnswers[i] = parseInt(r.value); break; }
        }
    }
    function isAllAnswered() { return currentAnswers.every(v => v !== null && v>=1 && v<=5); }
    function clearForm() {
        for (let i=0; i<24; i++) {
            const radios = document.getElementsByName(`q${i}`);
            radios.forEach(r => r.checked = false);
            currentAnswers[i] = null;
        }
    }

    // 歡呼聲 + 幸運草圖 (不依賴外部音檔，用 web audio 產生人聲般的歡呼)
    let audioCtx = null;
    function playCheerSound() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.4, now);
            masterGain.connect(audioCtx.destination);
            
            // 製作「Woo~ Hoo!」歡呼感: 快速上揚音階 + 短噪音
            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(440, now);
            osc1.frequency.exponentialRampToValueAtTime(880, now+0.15);
            osc1.connect(masterGain);
            osc1.start(now);
            osc1.stop(now+0.3);
            
            const osc2 = audioCtx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(550, now+0.1);
            osc2.frequency.exponentialRampToValueAtTime(1100, now+0.3);
            osc2.connect(masterGain);
            osc2.start(now+0.1);
            osc2.stop(now+0.45);
            
            // 短促的「嘿」聲 (噪聲)
            const bufferSize = 4096;
            const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
            noiseNode.onaudioprocess = function(e) {
                const output = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = (Math.random() * 2 - 1) * 0.15;
                }
                noiseNode.disconnect();
            };
            noiseNode.connect(masterGain);
            noiseNode.start = noiseNode.connect.bind(noiseNode);
            noiseNode.start(masterGain);
            setTimeout(() => noiseNode.disconnect(), 200);
        } catch(e) { console.log("歡呼聲播放失敗", e); }
    }

    // 顯示幸運草動畫 + 彩虹
    function showLuckyCloverAndRainbow() {
        // 彩虹
        const rainbow = document.getElementById("rainbowOverlay");
        rainbow.classList.remove("rainbow-active");
        void rainbow.offsetWidth;
        rainbow.classList.add("rainbow-active");
        setTimeout(() => rainbow.classList.remove("rainbow-active"), 1300);
        
        // 幸運草圖
        const clover = document.createElement("div");
        clover.className = "cheer-lucky";
        clover.innerHTML = "🎉🎉🎉";
        document.body.appendChild(clover);
        setTimeout(() => { if(clover) clover.remove(); }, 1000);
        
        // 歡呼聲音效
        playCheerSound();
    }

    function displayResult(scores, dominantType) {
        const resultDiv = document.getElementById("resultArea");
        let html = `<div class="result-title">📊 您的六型分數 (每型滿分20)</div><div class="scores-wrap" style="display:flex; flex-wrap:wrap; gap:10px;">`;
        for (let t of TYPE_KEYS) html += `<div class="score-badge" style="background:white; border-radius:60px; padding:6px 14px;">${TYPE_SHORT_ZH[t]} ${scores[t]}</div>`;
        html += `</div><div class="dominant-block" style="background:#e9d66b; padding:12px; border-radius:28px;">🏆 主導興趣類型：<strong>${TYPE_SHORT_ZH[dominantType]} (${dominantType})</strong><br>✨ 最貼近您的特質方向。</div>`;
        html += `<div class="type-desc" style="background:#fffef5; padding:12px; border-radius:24px;"><strong>📖 ${TYPE_SHORT_ZH[dominantType]} 詳細說明：</strong><br>${LONG_DESCRIPTIONS[dominantType].replace(/\n/g, '<br>')}</div>`;
        resultDiv.innerHTML = html;
        resultDiv.style.display = "block";
        resultDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function onSubmit() {
        syncAnswersFromDOM();
        if (!isAllAnswered()) { alert("⚠️ 請完成全部24個題目後再提交！"); return; }
        if (!currentStudentId) { alert("請先登入學號"); return; }
        const scores = computeScoresFromAnswers(currentAnswers);
        const dominant = getDominantType(scores);
        saveStudentRecord(currentStudentId, [...currentAnswers], scores, dominant);
        displayResult(scores, dominant);
        showLuckyCloverAndRainbow();   // 歡呼+幸運草+彩虹
        if (adminAuthenticated) renderAdminPanel();
    }

    function loadHistoryForStudent(studentId) {
        const record = loadStudentRecord(studentId);
        if (record && record.answers) {
            currentAnswers = [...record.answers];
            renderQuestions(currentAnswers);
            const scores = computeScoresFromAnswers(currentAnswers);
            const dominant = getDominantType(scores);
            displayResult(scores, dominant);
        } else {
            currentAnswers = new Array(24).fill(null);
            renderQuestions(currentAnswers);
            document.getElementById("resultArea").style.display = "none";
        }
    }

    function login(studentId) {
        const trimmed = studentId.trim();
        if (trimmed === "") {
            document.getElementById("loginError").style.display = "block";
            document.getElementById("loginError").innerText = "❌ 學號不可空白";
            return false;
        }
        currentStudentId = trimmed;
        document.getElementById("currentSid").innerText = currentStudentId;
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("surveyArea").style.display = "block";
        loadHistoryForStudent(currentStudentId);
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume();
        }
        return true;
    }

    function logout() {
        currentStudentId = null;
        currentAnswers = new Array(24).fill(null);
        document.getElementById("loginPanel").style.display = "block";
        document.getElementById("surveyArea").style.display = "none";
        document.getElementById("studentIdInput").value = "";
        document.getElementById("loginError").style.display = "none";
        document.getElementById("resultArea").style.display = "none";
        if (adminAuthenticated) document.getElementById("adminPanel").style.display = "none";
        adminAuthenticated = false;
    }

    function renderAdminPanel() {
        const records = getAllRecords();
        const studentIds = Object.keys(records);
        const total = studentIds.length;
        let content = `<div class="stat-card"><div class="stat-number">${total}</div><div>總測驗人數</div></div>`;
        if (total === 0) {
            content += `<p>📭 尚無任何學生測驗資料</p>`;
        } else {
            let tableHtml = `<table class="student-list-table" id="printableTable">
                <thead><tr><th>學號</th><th>現實型(R)</th><th>研究型(I)</th><th>藝術型(A)</th><th>社會型(S)</th><th>企業型(E)</th><th>傳統型(C)</th><th>主導類型</th></thead><tbody>`;
            for (let sid of studentIds.sort()) {
                let rec = records[sid];
                if (rec && rec.scores) {
                    let scores = rec.scores;
                    let dom = rec.dominant || getDominantType(scores);
                    tableHtml += `<tr><td>${sid}</td><td>${scores.R}</td><td>${scores.I}</td><td>${scores.A}</td><td>${scores.S}</td><td>${scores.E}</td><td>${scores.C}</td><td>${TYPE_SHORT_ZH[dom]} (${dom})</td></tr>`;
                }
            }
            tableHtml += `</tbody></table><div class="print-actions"><button id="printListBtn" class="btn-secondary" style="padding:6px 16px;">🖨️ 列印清單</button></div>`;
            content += tableHtml;
        }
        document.getElementById("adminStatsContent").innerHTML = content;
        const printBtn = document.getElementById("printListBtn");
        if (printBtn) {
            printBtn.addEventListener("click", () => {
                const printTable = document.getElementById("printableTable");
                if (!printTable) return;
                const win = window.open('', '_blank');
                win.document.write(`<html><head><title>霍兰德測驗結果清單</title><style>body{font-family:system-ui;padding:20px;} table{border-collapse:collapse;width:100%} th,td{border:1px solid #aaa;padding:8px;text-align:center;} th{background:#e0efd4;}</style></head><body>${printTable.outerHTML}</body></html>`);
                win.document.close();
                win.print();
            });
        }
    }

    function showAdminWithPwd() {
        const pwd = prompt("請輸入管理密碼:");
        if (pwd === "2002") {
            adminAuthenticated = true;
            document.getElementById("adminPanel").style.display = "block";
            renderAdminPanel();
        } else if (pwd !== null) alert("密碼錯誤");
    }

    function resetAllDataConfirm() {
        if (!adminAuthenticated) { alert("請先透過管理密碼驗證"); return; }
        if (confirm("⚠️ 清除所有學生的測驗記錄？無法復原！")) {
            clearAllData();
            if (currentStudentId) loadHistoryForStudent(currentStudentId);
            renderAdminPanel();
            alert("所有資料已清除。");
        }
    }

    function renderFullDescriptions() {
        const container = document.getElementById("fullTypeDescriptions");
        let html = "";
        for (let t of TYPE_KEYS) {
            html += `<div class="type-detail-item"><strong>${TYPE_SHORT_ZH[t]} (${t})</strong><br>${LONG_DESCRIPTIONS[t].replace(/\n/g, '<br>')}</div>`;
        }
        container.innerHTML = html;
    }

    function createFloatingLeaves() {
        const bg = document.getElementById("dynamicBg");
        for (let i=0; i<18; i++) {
            let leaf = document.createElement("i");
            leaf.innerHTML = ["🍀","🌿","🍃","✨"][Math.floor(Math.random()*4)];
            leaf.style.left = Math.random() * 100 + "%";
            leaf.style.animationDuration = 6 + Math.random() * 8 + "s";
            leaf.style.animationDelay = Math.random() * 8 + "s";
            leaf.style.fontSize = 20 + Math.random() * 28 + "px";
            leaf.style.opacity = 0.25;
            bg.appendChild(leaf);
        }
    }

    function bindEvents() {
        document.getElementById("loginBtn").addEventListener("click", () => login(document.getElementById("studentIdInput").value));
        document.getElementById("logoutBtn").addEventListener("click", logout);
        document.getElementById("submitSurveyBtn").addEventListener("click", onSubmit);
        document.getElementById("clearFormBtn").addEventListener("click", () => { if(confirm("清空所有作答？")){ clearForm(); renderQuestions(currentAnswers); document.getElementById("resultArea").style.display="none"; } });
        document.getElementById("openAdminBtn").addEventListener("click", showAdminWithPwd);
        document.getElementById("closeAdminBtn").addEventListener("click", () => { document.getElementById("adminPanel").style.display = "none"; adminAuthenticated=false; });
        document.getElementById("refreshAdminBtn").addEventListener("click", () => { if(adminAuthenticated) renderAdminPanel(); else alert("請先解鎖管理"); });
        document.getElementById("resetAllDataAdminBtn").addEventListener("click", resetAllDataConfirm);
    }

    function init() {
        renderFullDescriptions();
        bindEvents();
        createFloatingLeaves();
        document.getElementById("surveyArea").style.display = "none";
        document.getElementById("loginPanel").style.display = "block";
        currentAnswers = new Array(24).fill(null);
    }
    init();
</script>
</body>
